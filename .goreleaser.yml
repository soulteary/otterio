project_name: otterio

release:
   name_template: "Version {{.Version}}"
   disable: true
   github:
    owner: soulteary
    name: otterio

env:
  - CGO_ENABLED=0
  - GO111MODULE=on

before:
  hooks:
    - make clean
    - go generate ./...
    - go mod tidy
    - go mod download

builds:
  -
    goos:
      - linux
      - darwin
      - windows
      - freebsd

    goarch:
      - amd64
      - arm64
      - arm
      - ppc64le
      - s390x

    goarm:
      - 7

    ignore:
      - goos: darwin
        goarch: arm64
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x

    flags:
      - -tags=kqueue
      - -trimpath

    ldflags:
      - "-s -w -X github.com/soulteary/otterio/cmd.Version={{.Version}} -X github.com/soulteary/otterio/cmd.ReleaseTag={{.Tag}} -X github.com/soulteary/otterio/cmd.CommitID={{.FullCommit}} -X github.com/soulteary/otterio/cmd.ShortCommitID={{.ShortCommit}}"

archives:
  -
    format: binary
    name_template: "{{ .Binary }}-release/{{ .Os }}-{{ .Arch }}/{{ .Binary }}.{{ .Version }}"

nfpms:
  -
    id: otterio
    package_name: otterio
    vendor: soulteary
    homepage: https://github.com/soulteary/otterio
    maintainer: soulteary
    description: OtterIO is a High Performance Object Storage released under Apache License v2.0. It is API compatible with Amazon S3 cloud storage service. Use OtterIO to build high performance infrastructure for machine learning, analytics and application data workloads. Community-maintained fork of MinIO, not affiliated with MinIO, Inc.
    license: Apache 2.0
    bindir: /usr/bin
    formats:
      - deb
      - rpm
    overrides:
      deb:
        file_name_template: "{{ .Binary }}-release/debs/{{ .ProjectName }}-{{ .Version }}_{{ .Arch }}"
        replacements:
          arm: armv7
        files:
          "NOTICE": "/usr/share/otterio/NOTICE"
          "CREDITS": "/usr/share/otterio/CREDITS"
          "LICENSE": "/usr/share/otterio/LICENSE"
          "README.md": "/usr/share/otterio/README.md"
      rpm:
        file_name_template: "{{ .Binary }}-release/rpms/{{ .ProjectName }}-{{ .Version }}.{{ .Arch }}"
        replacements:
          amd64: x86_64
          arm64: aarch64
          arm: armv7
        files:
          "NOTICE": "/usr/share/otterio/NOTICE"
          "CREDITS": "/usr/share/otterio/CREDITS"
          "LICENSE": "/usr/share/otterio/LICENSE"
          "README.md": "/usr/share/otterio/README.md"

checksum:
  algorithm: sha256

signs:
  -
    signature: "${artifact}.minisig"
    cmd: "sh"
    args:
      - '-c'
      - 'minisign -s /media/${USER}/otterio/minisign.key -qQSm ${artifact} < /media/${USER}/otterio/minisign-passphrase'
    artifacts: all

changelog:
  sort: asc
  filters:
    exclude:
      - '^Update yaml files'

dockers:
  -
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    image_templates:
      - soulteary/otterio:{{ .Tag }}
      - soulteary/otterio:latest
