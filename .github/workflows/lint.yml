name: Lint

# Static analysis using golangci-lint.
#
# Runs on every PR and on every push to main. We use the official
# golangci-lint-action which handles caching and uses the project-local
# .golangci.yml configuration.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # `only-new-issues: true` posts issues as PR annotations.
  pull-requests: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # full history so revive/file-specific exclusions resolve correctly
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint must be built with a Go version >= the one declared
          # in go.mod (currently 1.26). Support for Go 1.26 landed in v2.9.0,
          # so we pin to a recent v2.x release that has it.
          version: v2.12
          args: --config ./.golangci.yml --timeout 10m --build-tags kqueue
          # Only annotate new issues on PRs to keep the noise low while we
          # incrementally clean up legacy findings.
          only-new-issues: true
