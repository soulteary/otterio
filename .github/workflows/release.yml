name: Release

# Build and publish a versioned release whenever a tag is pushed.
#
# Triggers on tags like:
#   - v1.2.3            (semver)
#   - RELEASE.2026-...  (MinIO-style release tags)
#
# Produces:
#   1. Cross-platform binaries (Linux/macOS/Windows, multiple arches) + checksums
#   2. Multi-arch Docker images pushed to GHCR (always) and Docker Hub (if secrets set)
#   3. A GitHub Release with the binaries attached
#
# Required configuration:
#   - GHCR: works out of the box using the built-in GITHUB_TOKEN.
#   - Docker Hub (optional): set repository secrets DOCKERHUB_USERNAME and
#     DOCKERHUB_TOKEN to also push to docker.io/<username>/otterio.

on:
  push:
    tags:
      - 'v*'
      - 'RELEASE.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version/tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

# A given tag should only be released once at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.x'

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # gen-ldflags.go reads git history to derive commit/version info.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # TAG is what we publish images/releases under (the git tag itself).
          # VERSION is what gets passed to gen-ldflags.go as cmd.Version.
          #
          # For MinIO-style tags (RELEASE.2026-06-04T10-53-00Z) gen-ldflags.go
          # re-adds the "RELEASE." prefix and converts ':' -> '-', so we must
          # hand it the plain RFC3339 timestamp (2026-06-04T10:53:00Z) instead
          # of the already-prefixed tag, otherwise the prefix is applied twice.
          case "${TAG}" in
            RELEASE.*)
              VERSION="$(echo "${TAG}" | \
                sed 's#RELEASE\.\([0-9]\+\)-\([0-9]\+\)-\([0-9]\+\)T\([0-9]\+\)-\([0-9]\+\)-\([0-9]\+\)Z#\1-\2-\3T\4:\5:\6Z#')"
              ;;
            *)
              VERSION="${TAG}"
              ;;
          esac

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Git tag:        ${TAG}"
          echo "Build version:  ${VERSION}"

      - name: Cross compile
        env:
          CGO_ENABLED: '0'
          GO111MODULE: 'on'
          OTTERIO_RELEASE: RELEASE
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          LDFLAGS="$(go run buildscripts/gen-ldflags.go "${VERSION}")"
          mkdir -p dist
          platforms="linux/amd64 linux/arm64 linux/ppc64le linux/s390x darwin/amd64 darwin/arm64 windows/amd64"
          for p in ${platforms}; do
            os="${p%/*}"
            arch="${p#*/}"
            out="dist/otterio-${os}-${arch}"
            if [ "${os}" = "windows" ]; then
              out="${out}.exe"
            fi
            echo "==> Building ${out}"
            GOOS="${os}" GOARCH="${arch}" go build \
              -tags kqueue -trimpath -ldflags "${LDFLAGS}" -o "${out}" .
          done
          ( cd dist && sha256sum * > "otterio-${TAG}-checksums.txt" )
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 7

  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Make Linux binaries executable
        run: chmod +x dist/otterio-linux-*

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          VERSION="${{ needs.binaries.outputs.tag }}"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          GHCR_REPO="ghcr.io/${OWNER}/otterio"
          TAGS="${GHCR_REPO}:${VERSION},${GHCR_REPO}:latest"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            DH_REPO="${DOCKERHUB_USERNAME}/otterio"
            TAGS="${TAGS},${DH_REPO}:${VERSION},${DH_REPO}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${TAGS}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64,linux/ppc64le,linux/s390x
          push: true
          build-args: |
            RELEASE=${{ needs.binaries.outputs.tag }}
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          name: Version ${{ needs.binaries.outputs.tag }}
          files: dist/*
          generate_release_notes: true
