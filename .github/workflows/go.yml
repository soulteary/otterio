name: Go

# Run unit tests, race detector, cross-compile and a few integration-style
# verifications on every PR and on every push to main.
#
# This workflow mirrors the local `make` targets so that what passes here is
# what we ship. The work is split across several independent jobs so that
# GitHub Actions can run them in parallel, drastically reducing wall-clock
# time compared to one giant sequential job.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs on the same ref to save CI minutes.
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.4"
  CGO_ENABLED: "0"
  GO111MODULE: "on"

jobs:
  # Cross platform unit tests + plain build. Kept as a small matrix so that
  # ubuntu and windows run in parallel instead of serializing inside one job.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # setup-go ships its own module cache helper, but it does not cover the
      # build cache (GOCACHE) and uses different keys per platform. We disable
      # it here and manage both caches explicitly below so Windows benefits as
      # much as Linux on subsequent runs.
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve Go cache paths
        id: gocache
        shell: bash
        run: |
          echo "modcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "buildcache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.gocache.outputs.modcache }}
            ${{ steps.gocache.outputs.buildcache }}
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      # Pull modules in a dedicated step so the (potentially noisy) download
      # output is clearly separated from the build/test output in the UI.
      - name: Download modules
        shell: bash
        run: go mod download

      - name: Build (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Windows is intentionally limited to a compile-only check: it
          # guarantees the tree builds cleanly on windows/amd64 (matching
          # the binaries we ship via goreleaser) without paying for the full
          # ./cmd/... test suite, which inherits MinIO's POSIX-only test
          # assumptions (e.g. erasure format/healing paths, data-usage
          # scanner) and either deadlocks or fails on Windows file system
          # semantics. Upstream MinIO itself runs its Go tests only on
          # Linux for the same reason; the full ./... matrix lives on the
          # Linux job below where it actually exercises real behaviour.
          #
          # We still inject version info via gen-ldflags so the produced
          # binary (and the browser uiVersion it reports) is a valid
          # RFC3339 version instead of the "DEVELOPMENT.GOGET" default,
          # matching the Makefile/Docker builds.
          go build --ldflags="$(go run buildscripts/gen-ldflags.go)" -o otterio.exe

      - name: Build & test (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go build --ldflags="$(go run buildscripts/gen-ldflags.go)" -o otterio
          go test -timeout 50m ./...

  # Race detector tests are by far the slowest step, so they get their own job.
  test-race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve Go cache paths
        id: gocache
        shell: bash
        run: |
          echo "modcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "buildcache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      # Use a race-specific cache key: the race-instrumented standard library
      # and test binaries live in GOCACHE under different entries than the
      # plain build, and sharing a key would cause constant evictions.
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.gocache.outputs.modcache }}
            ${{ steps.gocache.outputs.buildcache }}
          key: ${{ runner.os }}-go-race-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-race-${{ env.GO_VERSION }}-

      - name: Download modules
        shell: bash
        run: go mod download

      - name: make test-race
        run: |
          sudo sysctl net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl net.ipv6.conf.default.disable_ipv6=0
          make test-race

  # Lint and code-generation freshness check. Previously these ran implicitly
  # as part of `make test-race` (via the `verifiers` prerequisite), which
  # bloated the race detector job's wall-clock time. Splitting them out lets
  # them run in parallel with race tests instead of blocking them.
  lint:
    name: Lint & generated code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make verifiers
        run: make verifiers

  # Cross compile to all supported GOOS/GOARCH combinations.
  crosscompile:
    name: Cross compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make crosscompile
        run: make crosscompile

  # # Integration-style verification (boots the server and exercises it).
  # verify:
  #   name: Verify build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-go@v6
  #       with:
  #         go-version: ${{ env.GO_VERSION }}
  #         cache: true
  #     - name: make verify
  #       run: |
  #         sudo sysctl net.ipv6.conf.all.disable_ipv6=0
  #         sudo sysctl net.ipv6.conf.default.disable_ipv6=0
  #         make verify

  # Healing verification (boots the server with -race and exercises healing).
  verify-healing:
    name: Verify healing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make verify-healing
        run: |
          sudo sysctl net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl net.ipv6.conf.default.disable_ipv6=0
          make verify-healing

  # Use the official Go vulnerability scanner instead of Nancy.
  # govulncheck queries the Go vulnerability database (pkg.go.dev/vuln) and
  # only flags vulnerabilities that are actually reachable from our code, so
  # it is both more accurate and more reliable than third-party OSS Index
  # based tooling.
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install & run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Browser unit tests run independently of Go - no need to hold up other jobs.
  browser:
    name: Browser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: bun test
        working-directory: browser
        run: |
          bun install
          bun run test

  # Lightweight static checks: shellcheck on mint scripts.
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y devscripts shellcheck
      - name: Run shellcheck
        run: bash -c 'shopt -s globstar; shellcheck mint/**/*.sh'
