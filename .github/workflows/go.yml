name: Go

# Run unit tests, race detector, cross-compile and a few integration-style
# verifications on every PR and on every push to main.
#
# This workflow is intentionally heavy: it mirrors the local `make` targets
# so that what passes here is what we ship.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs on the same ref to save CI minutes.
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test on Go ${{ matrix.go-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.4]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build on ${{ matrix.os }}
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          CGO_ENABLED: 0
          GO111MODULE: on
        run: |
          # Inject version info via gen-ldflags so the binary (and the browser
          # uiVersion it reports) is a valid RFC3339 version instead of the
          # "DEVELOPMENT.GOGET" default, matching the Makefile/Docker builds.
          go build --ldflags="$(go run buildscripts/gen-ldflags.go)" -o otterio.exe
          go test -v --timeout 50m ./...

      - name: Build on ${{ matrix.os }}
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: 0
          GO111MODULE: on
        run: |
          sudo sysctl net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl net.ipv6.conf.default.disable_ipv6=0
          sudo apt-get install devscripts shellcheck
          # Use the official Go vulnerability scanner instead of Nancy.
          # govulncheck queries the Go vulnerability database (pkg.go.dev/vuln)
          # and only flags vulnerabilities that are actually reachable from our
          # code, so it's both more accurate and more reliable than third-party
          # OSS Index based tooling.
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
          make
          make test-race
          make crosscompile
          make verify
          make verify-healing
          cd browser && bun install && bun run test && cd ..
          bash -c 'shopt -s globstar; shellcheck mint/**/*.sh'
