<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="OtterIO — S3-Compatible Object Storage">
  <title>OtterIO</title>
  <desc>OtterIO — S3-Compatible Object Storage</desc>
  <style>
    .wm { font-family: "Trebuchet MS", "Segoe UI", Verdana, Arial, sans-serif; font-weight: 800; }
    .tag { font-family: "Segoe UI", Arial, sans-serif; font-weight: 600; letter-spacing: 2px; }
  </style>

  <!-- Circular wave emblem -->
  <g transform="translate(48 48)">
    <circle r="34" fill="none" stroke="#1e3a5f" stroke-width="5"/>
    <path d="M-22 6 q11 -12 22 0 t22 0" fill="none" stroke="#4a7a96" stroke-width="4" stroke-linecap="round"/>
    <path d="M-22 16 q11 -12 22 0 t22 0" fill="none" stroke="#7aa6bf" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-6" cy="-10" r="4.5" fill="#1e3a5f"/>
    <circle cx="10" cy="-10" r="4.5" fill="#1e3a5f"/>
    <path d="M-2 -2 q4 4 8 0" fill="none" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text class="wm" x="98" y="52" font-size="42" fill="#1e3a5f">Otter<tspan fill="#4a7a96">IO</tspan></text>
  <line x1="100" y1="64" x2="350" y2="64" stroke="#7aa6bf" stroke-width="1.5"/>
  <text class="tag" x="100" y="82" font-size="11" fill="#4a7a96">S3-COMPATIBLE OBJECT STORAGE</text>
</svg>
